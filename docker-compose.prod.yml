services:
  mongo:
    image: mongo:7
    container_name: contaquiz-mongo-prod
    volumes:
      - mongo_data_prod:/data/db
    networks:
      - contaquiz-net
    restart: always

  backend:
    build:
      context: ./backend
      target: prod
    container_name: contaquiz-backend-prod
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/contaquiz
      - JWT_SECRET=${JWT_SECRET:-contaquiz-dev-secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    depends_on:
      - mongo
    networks:
      - contaquiz-net
    restart: always

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: contaquiz-frontend-prod
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - contaquiz-net
    restart: always

volumes:
  mongo_data_prod:

networks:
  contaquiz-net:
    driver: bridge
