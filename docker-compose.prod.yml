services:
  postgres:
    image: postgres:16-alpine
    container_name: contaquiz-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
      POSTGRES_DB: contaquiz_db
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - contaquiz-net
    restart: always

  backend:
    build:
      context: ./backend/backend-quiz
    container_name: contaquiz-backend-prod
    ports:
      - "${PORT:-5000}:8080"
    environment:
      - PORT=8080
      - DB_URL=jdbc:postgresql://postgres:5432/contaquiz_db
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-localpassword}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contaquiz-net
    restart: always

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: contaquiz-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      - backend
    networks:
      - contaquiz-net
    restart: always

volumes:
  pgdata_prod:

networks:
  contaquiz-net:
    driver: bridge
